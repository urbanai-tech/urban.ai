<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#E8500A" />
    <title>Urban AI offline</title>
    <style>
      :root {
        color-scheme: dark;
        background: #080a0f;
        color: #f7f1ea;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(440px, 100%);
      }

      img {
        width: 56px;
        height: 56px;
        display: block;
        margin-bottom: 28px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 0.95;
        text-transform: uppercase;
      }

      p {
        margin: 0;
        color: #c9c0b8;
        font-size: 1rem;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        margin-top: 28px;
        color: #080a0f;
        background: #e8500a;
        border-radius: 8px;
        padding: 12px 16px;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa-icon-192.png" alt="Urban AI" />
      <h1>Sem conexao</h1>
      <p>
        Nao conseguimos carregar o painel agora. Assim que a internet voltar,
        recarregue para sincronizar dashboard, calendario e recomendacoes.
      </p>
      <a href="/">Tentar novamente</a>
    </main>
  </body>
</html>
