name: Release gate — tsc + build + Playwright

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # === Job 1: tsc + Next build (sempre roda) ===
  build:
    name: tsc + next build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Next.js production build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL_STAGING || 'https://urban-ai-back-staging.up.railway.app' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL_STAGING || 'https://app-staging.myurbanai.com' }}
          NEXT_PUBLIC_PRELAUNCH_MODE: 'false'
        run: npx next build

  # === Job 2: Playwright smoke público (sem auth — sempre roda) ===
  e2e-public:
    name: Playwright — smoke público
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run public smoke specs
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL || 'https://app.myurbanai.com' }}
          E2E_API_URL: ${{ secrets.E2E_API_URL || 'https://urban-ai-back-production.up.railway.app' }}
        run: |
          npx playwright test \
            --project=chromium \
            release-gate-public.spec.ts \
            smoke.spec.ts \
            prelaunch-waitlist-analytics.spec.ts \
            a11y.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-public
          path: playwright-report/
          retention-days: 7

  # === Job 3: Playwright smoke autenticado (so roda com secrets) ===
  e2e-authenticated:
    name: Playwright — smoke autenticado (host + admin)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build
    # So roda se os secrets de auth estiverem configurados em repo settings
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run authenticated smoke specs
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL || 'https://app.myurbanai.com' }}
          E2E_API_URL: ${{ secrets.E2E_API_URL || 'https://urban-ai-back-production.up.railway.app' }}
          E2E_AUTH_EMAIL: ${{ secrets.E2E_AUTH_EMAIL }}
          E2E_AUTH_PASSWORD: ${{ secrets.E2E_AUTH_PASSWORD }}
          E2E_ALPHA_EMAIL: ${{ secrets.E2E_ALPHA_EMAIL }}
        run: |
          if [ -z "$E2E_AUTH_EMAIL" ] || [ -z "$E2E_AUTH_PASSWORD" ]; then
            echo "::warning ::E2E_AUTH_EMAIL/E2E_AUTH_PASSWORD não configurados — pulando smoke autenticado"
            exit 0
          fi
          npx playwright test \
            --project=chromium \
            authenticated-smoke.spec.ts \
            login-post-login.spec.ts \
            logout.spec.ts \
            dashboard-recommendations.spec.ts \
            my-plan-billing.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-authenticated
          path: playwright-report/
          retention-days: 7
