name: Release gate - frontend tsc, build and Playwright

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Frontend - tsc + next build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: Urban-front-main

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: Urban-front-main/yarn.lock

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Type-check
        run: npx tsc --noEmit

      - name: Next.js production build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL_STAGING || 'https://urban-ai-back-staging.up.railway.app' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL_STAGING || 'https://app-staging.myurbanai.com' }}
          NEXT_PUBLIC_PRELAUNCH_MODE: 'false'
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_dummy
          NEXTAUTH_SECRET: ci_dummy_secret_not_for_prod
          NEXTAUTH_URL: http://localhost:3000
        run: yarn build

  e2e-public:
    name: Playwright - public smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    defaults:
      run:
        working-directory: Urban-front-main

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: Urban-front-main/yarn.lock

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Build local smoke app
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.E2E_API_URL || 'https://urbanai-production-85fd.up.railway.app' }}
          NEXT_PUBLIC_APP_URL: https://app.myurbanai.com
          NEXT_PUBLIC_PRELAUNCH_MODE: 'false'
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_dummy
          NEXTAUTH_SECRET: ci_dummy_secret_not_for_prod
          NEXTAUTH_URL: http://127.0.0.1:3000
        run: yarn build

      - name: Start local smoke app
        run: |
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi
          PORT=3000 HOSTNAME=127.0.0.1 nohup node .next/standalone/server.js > /tmp/urban-next.log 2>&1 &
          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/urban-next.log
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run public smoke specs
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_API_URL: ${{ secrets.E2E_API_URL || 'https://urbanai-production-85fd.up.railway.app' }}
        run: |
          npx playwright test \
            --project=chromium \
            release-gate-public.spec.ts \
            smoke.spec.ts \
            prelaunch-waitlist-analytics.spec.ts \
            a11y.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-public
          path: Urban-front-main/playwright-report/
          retention-days: 7

  e2e-authenticated:
    name: Playwright - authenticated smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: Urban-front-main

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: Urban-front-main/yarn.lock

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run authenticated smoke specs
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL || 'https://app.myurbanai.com' }}
          E2E_API_URL: ${{ secrets.E2E_API_URL || 'https://urbanai-production-85fd.up.railway.app' }}
          E2E_AUTH_EMAIL: ${{ secrets.E2E_AUTH_EMAIL }}
          E2E_AUTH_PASSWORD: ${{ secrets.E2E_AUTH_PASSWORD }}
          E2E_ALPHA_EMAIL: ${{ secrets.E2E_ALPHA_EMAIL }}
        run: |
          if [ -z "$E2E_AUTH_EMAIL" ] || [ -z "$E2E_AUTH_PASSWORD" ]; then
            echo "::warning ::E2E_AUTH_EMAIL/E2E_AUTH_PASSWORD not configured - skipping authenticated smoke"
            exit 0
          fi
          npx playwright test \
            --project=chromium \
            authenticated-smoke.spec.ts \
            authenticated-mobile-smoke.spec.ts \
            login-post-login.spec.ts \
            logout.spec.ts \
            dashboard-recommendations.spec.ts \
            my-plan-billing.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-authenticated
          path: Urban-front-main/playwright-report/
          retention-days: 7
