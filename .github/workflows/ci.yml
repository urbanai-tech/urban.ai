name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  backend-unit:
    name: Backend — Jest unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: urban-ai-backend-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: urban-ai-backend-main/package-lock.json
      - run: npm ci
      - name: TypeScript build
        run: npx tsc --noEmit -p tsconfig.build.json
      - name: Jest unit specs
        run: npx jest --passWithNoTests

  frontend-lint:
    name: Frontend — build + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Urban-front-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Urban-front-main/package-lock.json
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit

  frontend-smoke:
    name: Frontend — Playwright smoke (staging)
    runs-on: ubuntu-latest
    # Só roda contra staging quando existir (F5C.2 item 11).
    # Até lá, o job é ignorado automaticamente pela condição.
    if: ${{ vars.E2E_BASE_URL != '' }}
    defaults:
      run:
        working-directory: Urban-front-main
    env:
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Urban-front-main/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Urban-front-main/playwright-report/
          retention-days: 14
