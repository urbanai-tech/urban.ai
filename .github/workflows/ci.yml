name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===================== Backend =====================

  backend-test:
    name: Backend — typecheck + jest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: urban-ai-backend-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: urban-ai-backend-main/yarn.lock
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Jest unit + integration
        run: npx jest --passWithNoTests --ci
      - name: Migration coverage audit
        run: yarn audit:migrations:strict
      - name: MySQL backup dry-run
        run: yarn backup:mysql:dry

  backend-build:
    name: Backend — nest build (prod artifact)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: urban-ai-backend-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: urban-ai-backend-main/yarn.lock
      - run: yarn install --frozen-lockfile
      - name: Nest build
        run: npx nest build
      - name: Verify dist/main.js exists
        run: test -f dist/main.js

  backend-migrations:
    name: Backend — migrations dry-run against MySQL
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: urban-ai-backend-main
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: ai_urban_ci
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: '3306'
      DB_USER: root
      DB_PASSWORD: rootpw
      DB_NAME: ai_urban_ci
      DB_SYNCHRONIZE: 'false'
      MIGRATIONS_RUN: 'true'
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: urban-ai-backend-main/yarn.lock
      - run: yarn install --frozen-lockfile
      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -uroot -prootpw --silent; then
              echo "MySQL ready"; break
            fi
            echo "waiting MySQL... ($i)"; sleep 2
          done
      - name: Run migrations (validate they apply cleanly to fresh DB)
        run: yarn typeorm migration:run

  # ===================== Frontend =====================

  frontend-test:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Urban-front-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: Urban-front-main/yarn.lock
      - run: yarn install --frozen-lockfile
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Next.js build
        run: yarn build
        env:
          # Mocks só pra build CI passar — não vão pra runtime.
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_dummy
          NEXTAUTH_SECRET: ci_dummy_secret_not_for_prod
          NEXTAUTH_URL: http://localhost:3000

  # ===================== Python services =====================

  webscraping-test:
    name: Webscraping - pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: urban-webscraping-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: urban-webscraping-main/uv.lock
      - name: Install dependencies
        run: uv sync --all-groups --frozen
      - name: Pytest
        run: uv run pytest -q

  pipeline-test:
    name: Pipeline - pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: urban-pipeline-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: urban-pipeline-main/uv.lock
      - name: Install dependencies
        run: uv sync --all-groups --frozen
      - name: Pytest
        run: uv run pytest tests -q

  # ===================== Release evidence =====================

  release-evidence:
    name: Release - evidence dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate release evidence preview
        run: node scripts/release-evidence.js --dry-run

  # ===================== E2E (mocked local app) =====================

  frontend-e2e-mock-local:
    name: Frontend - Playwright mocked local E2E
    runs-on: ubuntu-latest
    needs: [frontend-test]
    defaults:
      run:
        working-directory: Urban-front-main
    env:
      E2E_BASE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_dummy
      NEXTAUTH_SECRET: ci_dummy_secret_not_for_prod
      NEXTAUTH_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: Urban-front-main/yarn.lock
      - run: yarn install --frozen-lockfile
      - name: Guard local-only E2E targets
        run: |
          test "$E2E_BASE_URL" = "http://127.0.0.1:3000"
          test "$NEXT_PUBLIC_API_URL" = "http://127.0.0.1:3001"
          case "$E2E_BASE_URL $NEXT_PUBLIC_API_URL" in
            *myurbanai*|*railway*|*production*|*staging*) exit 1 ;;
          esac
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build local app
        run: yarn build
      - name: Start local app
        run: |
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi
          PORT=3000 HOSTNAME=127.0.0.1 node .next/standalone/server.js > /tmp/urban-front-next.log 2>&1 &
          echo $! > /tmp/urban-front-next.pid
      - name: Wait for local app
        run: |
          for i in $(seq 1 30); do
            if curl --silent --fail "$E2E_BASE_URL" >/dev/null; then
              echo "Next.js ready"; exit 0
            fi
            echo "waiting Next.js... ($i)"; sleep 2
          done
          cat /tmp/urban-front-next.log
          exit 1
      - name: Run mocked local E2E tests
        run: >-
          npx playwright test
          onboarding-airbnb-import.spec.ts
          dashboard-recommendations.spec.ts
          email-confirmation.spec.ts
          f8-waitlist-to-login.spec.ts
          login-post-login.spec.ts
          logout.spec.ts
          my-plan-billing.spec.ts
          plans-checkout-readiness.spec.ts
          properties-pricing.spec.ts
          reset-password.spec.ts
          prelaunch-waitlist-analytics.spec.ts
          admin-quality-occupancy.spec.ts
          stays-integrations.spec.ts
          --project=chromium
      - name: Upload mocked local Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mock-local
          path: Urban-front-main/playwright-report/
          retention-days: 14

  # ===================== E2E (only if staging URL configured) =====================

  frontend-smoke:
    name: Frontend - Playwright public smoke
    runs-on: ubuntu-latest
    needs: [frontend-test]
    if: ${{ vars.E2E_BASE_URL != '' }}
    defaults:
      run:
        working-directory: Urban-front-main
    env:
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: Urban-front-main/yarn.lock
      - run: yarn install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run public smoke tests
        run: npx playwright test smoke.spec.ts release-gate-public.spec.ts --project=chromium
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Urban-front-main/playwright-report/
          retention-days: 14

  product-audit:
    name: Produto - E2E audit admin/host
    runs-on: ubuntu-latest
    needs: [frontend-test]
    if: ${{ vars.E2E_PRODUCT_AUDIT_ENABLED == 'true' && vars.E2E_BASE_URL != '' && vars.E2E_API_URL != '' }}
    defaults:
      run:
        working-directory: Urban-front-main
    env:
      E2E_AUDIT_MODE: all
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
      E2E_API_URL: ${{ vars.E2E_API_URL }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: Urban-front-main/yarn.lock
      - run: yarn install --frozen-lockfile
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Validate audit credentials
        run: |
          test -n "$E2E_EMAIL"
          test -n "$E2E_PASSWORD"
      - name: Run product audit
        run: node ./scripts/e2e-product-audit.js
      - name: Upload product audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-e2e-audit
          path: docs/e2e-reports/
          retention-days: 14
